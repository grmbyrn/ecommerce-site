name: Deploy to Vercel

on:
  push:
    branches: [ 'main' ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build (only on main)
        if: github.ref == 'refs/heads/main'
        run: npm run build
      - name: Install Vercel CLI
        run: npm i -g vercel
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx vercel --token $VERCEL_TOKEN --yes
          else
            npx vercel --prod --token $VERCEL_TOKEN --yes
          fi
